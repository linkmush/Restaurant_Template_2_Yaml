apiVersion: apps/v1
kind: Deployment

metadata:
  name: restaurant-template

  labels:
    # Identifierar vilken applikation Deployment-resursen tillhör.
    # Miljöspecifika labels, exempelvis environment=dev,
    # läggs till av respektive Kustomize-overlay.
    app: restaurant-template

spec:
  # Grundvärdet är en replika.
  # En overlay kan senare ändra detta för exempelvis test eller prod.
  replicas: 1

  # Behåller högst tre äldre ReplicaSets för historik och rollback.
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      # Deploymenten hanterar pods med denna label.
      # Deployment-selectorn hålls stabil och miljöoberoende.
      app: restaurant-template

  template:
    metadata:
      labels:
        # Identifierar poddarna som en del av restaurant-template.
        # Environment-labeln läggs till av miljöns overlay.
        app: restaurant-template

    spec:
      # Poddarna använder en egen ServiceAccount i stället för "default".
      serviceAccountName: restaurant-app

      # Applikationen behöver inte kommunicera med Kubernetes API.
      # Därför monteras ingen ServiceAccount-token i containern.
      automountServiceAccountToken: false

      nodeSelector:
        # Gemensamt för samtliga miljöer:
        # applikationen får bara köras på application-noder.
        node-pool: applications

        # environment=dev ligger inte i base.
        # Det läggs i dev-overlayn eftersom det är miljöspecifikt.

      containers:
        - name: restaurant-template

          securityContext:
            # Kubernetes ska vägra starta podden om imagen försöker köra som root.
            runAsNonRoot: true

            # Processen får inte skaffa högre privilegier.
            allowPrivilegeEscalation: false

            # Använd containerruntimens standardprofil för seccomp.
            seccompProfile:
              type: RuntimeDefault

            # Ta bort alla Linux capabilities.
            capabilities:
              drop:
                - ALL

            # Gör containerns vanliga filsystem skrivskyddat.
            readOnlyRootFilesystem: true

          # Nginx behöver en begränsad skrivbar plats för tillfälliga filer.
          # Resten av containerns filsystem är fortfarande skrivskyddat.
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp

          # Overlayn kan byta tagg utan att denna fil behöver ändras.
          image: ghcr.io/linkmush/restaurant-template:1.1

          ports:
            - name: http

              # Containern lyssnar på port 8080.
              # Service-resursen exponerar fortfarande applikationen på port 80.
              containerPort: 8080

          resources:
            requests:
              # Resurser som reserveras vid schemaläggning.
              cpu: "50m"
              memory: "64Mi"

            limits:
              # Högsta tillåtna resursanvändning.
              cpu: "250m"
              memory: "128Mi"

          readinessProbe:
            # Kontrollerar om applikationen är redo att ta emot trafik.
            httpGet:
              path: /
              port: 8080

            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            # Kontrollerar om applikationen fortfarande fungerar.
            # Kubernetes startar om containern efter upprepade fel.
            httpGet:
              path: /
              port: 8080

            initialDelaySeconds: 15
            periodSeconds: 20

      # Skapar en tillfällig skrivbar volym för Nginx.
      volumes:
        - name: nginx-tmp
          emptyDir:
            sizeLimit: 64Mi

      imagePullSecrets:
        # Autentisering mot det privata GHCR-registret.
        # Secret-resursen måste finnas i samma namespace som podden.
        - name: ghcr-secret
