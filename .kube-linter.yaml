checks:
  # Tillfälliga undantag för den befintliga legacy-imagen
  # ghcr.io/linkmush/restaurant-template:1.0.
  #
  # Imagen kör som root och är inte verifierad för ett
  # skrivskyddat root-filsystem.
  #
  # Undantagen ska tas bort när applikationsteamet levererar
  # en non-root-kompatibel image.
  exclude:
    - run-as-non-root
    - no-read-only-root-fs
