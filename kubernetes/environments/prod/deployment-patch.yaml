apiVersion: apps/v1
kind: Deployment

metadata:
  name: restaurant-template

  labels:
    # Märker Deployment-resursen som tillhörande prod-miljön.
    environment: prod

spec:
  # Prod kör en replika.
  replicas: 1

  template:
    metadata:
      labels:
        # Märker poddarna som tillhörande dev-miljön.
        environment: prod


      # Prod-poddarna kräver en worker node märkt environment=prod.
      #
      # Base-konfigurationens node-pool=applications finns också kvar.
      # Noden måste alltså uppfylla båda villkoren.
    #spec:
     # nodeSelector:
      #  environment: prod