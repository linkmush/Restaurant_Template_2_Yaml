apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Sätter restaurant-prod på alla namespacade resurser från base.
namespace: restaurant-prod

resources:
  # Återanvänd restaurangapplikationens gemensamma base.
  - ../../apps/restaurant/base

  # Skapa även prod-namespacet.
  - namespace.yaml

  - security/readonly-serviceaccount.yaml
  - security/readonly-rbac.yaml
  - security/resourcequota.yaml
  - security/limitrange.yaml
  - security/networkpolicies.yaml

# Miljöspecifika ändringar.
patches:
  - path: deployment-patch.yaml

  - path: service-patch.yaml

  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: restaurant-ingress
    path: ingress-patch.yaml

# Prod väljer sin image-tagg oberoende av dev och andra miljöer.
# Senare kan test och dev använda andra taggar.
images:
  - name: ghcr.io/linkmush/restaurant-template
    newTag: "1.1"
